version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: webrtc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: webrtc_user
      POSTGRES_PASSWORD: webrtc_password
      POSTGRES_DB: webrtc_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webrtc_user -d webrtc_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: webrtc-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://webrtc_user:webrtc_password@postgres:5432/webrtc_db"
      LIVEKIT_URL: "${LIVEKIT_URL}"
      LIVEKIT_API_KEY: "${LIVEKIT_API_KEY}"
      LIVEKIT_API_SECRET: "${LIVEKIT_API_SECRET}"
      JWT_SECRET: "${JWT_SECRET:-change-this-secret-in-production}"
      FRONTEND_URL: "http://localhost:5173"
      NODE_ENV: "production"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: webrtc-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    environment:
      VITE_APP_BACKEND_URL: "http://localhost:3000"
      VITE_LIVEKIT_URL: "${LIVEKIT_URL}"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local

networks:
  default:
    name: webrtc-network
